name: TraceVault Skip Trace

on:
  workflow_dispatch:
    inputs:
      first:
        description: 'First Name'
        required: true
      last:
        description: 'Last Name'
        required: true
      address:
        description: 'Street Address'
        required: false
        default: ''
      city:
        description: 'City'
        required: false
        default: ''
      state:
        description: 'State (e.g. OH)'
        required: false
        default: ''
      zip:
        description: 'ZIP Code'
        required: false
        default: ''

jobs:
  trace:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Write input file
        run: |
          cat > trace_input.json << 'EOF'
          {
            "first": "${{ github.event.inputs.first }}",
            "last": "${{ github.event.inputs.last }}",
            "address": "${{ github.event.inputs.address }}",
            "city": "${{ github.event.inputs.city }}",
            "state": "${{ github.event.inputs.state }}",
            "zip": "${{ github.event.inputs.zip }}"
          }
          EOF

      - name: Run scraper
        run: python scraper.py

      - name: Commit results
        run: |
          git config --global user.email "tracevault@github.com"
          git config --global user.name "TraceVault Bot"
          git add results.json trace_input.json
          git commit -m "Trace: ${{ github.event.inputs.first }} ${{ github.event.inputs.last }}" || echo "No changes"
          git push
